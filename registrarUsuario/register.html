<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Match - Crear Cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="background-animation"></div>

    <div class="floating-elements">
        <div class="floating-element floating-element-1">
            <i class="fas fa-cut"></i>
        </div>
        <div class="floating-element floating-element-2">
            <i class="fas fa-spa"></i>
        </div>
        <div class="floating-element floating-element-3">
            <i class="fas fa-paint-brush"></i>
        </div>
        <div class="floating-element floating-element-4">
            <i class="fas fa-hand-sparkles"></i>
        </div>
    </div>

    <header class="header">
        <div class="logo-container">
            <div class="logo">
                <img src="../paginaPrincipal/logo.jpeg" alt="Velvet Match" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">
            </div>
            <span class="brand-name">Velvet Match</span>
        </div>
        <nav class="nav">
            <a href="../paginaPrincipal/pantalla_principal.html" class="nav-link">Inicio</a>
            <a href="../login/login.html" class="nav-link">Iniciar Sesión</a>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-card">

            <div class="login-decoration">
                <div class="decoration-circle"></div>
                <div class="decoration-circle"></div>
                <div class="decoration-circle"></div>
            </div>

            <div class="login-header">
                <h1 class="login-title">Crear cuenta</h1>
                <p class="login-subtitle">Únete a Velvet Match y digitaliza tu negocio</p>
            </div>

            <form class="login-form" id="registerForm">

                <div class="form-group">
                    <label for="firstName" class="form-label">
                        <i class="fas fa-user"></i>
                        Nombre
                    </label>
                    <input type="text" id="firstName" class="form-input"
                           placeholder="Tu nombre" required>
                    <div class="input-focus-effect"></div>
                </div>

                <div class="form-group">
                    <label for="lastName" class="form-label">
                        <i class="fas fa-user"></i>
                        Apellido
                    </label>
                    <input type="text" id="lastName" class="form-input"
                           placeholder="Tu apellido" required>
                    <div class="input-focus-effect"></div>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i>
                        Correo Electrónico
                    </label>
                    <input type="email" id="email" class="form-input"
                           placeholder="tucorreo@ejemplo.com" required>
                    <div class="input-focus-effect"></div>
                </div>

                <div class="form-group">
                    <label for="birthdate" class="form-label">
                        <i class="fas fa-calendar"></i>
                        Fecha de Nacimiento
                    </label>
                    <input type="date" id="birthdate" class="form-input" required>
                    <div class="input-focus-effect"></div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i>
                        Contraseña
                    </label>
                    <div class="password-field">
                        <input type="password" id="password" class="form-input"
                               placeholder="Mínimo 8 caracteres" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password', 'toggleIcon1')">
                            <i class="fas fa-eye" id="toggleIcon1"></i>
                        </button>
                    </div>
                    <div class="input-focus-effect"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">
                        <i class="fas fa-lock"></i>
                        Confirmar Contraseña
                    </label>
                    <div class="password-field">
                        <input type="password" id="confirmPassword" class="form-input"
                               placeholder="Repite tu contraseña" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', 'toggleIcon2')">
                            <i class="fas fa-eye" id="toggleIcon2"></i>
                        </button>
                    </div>
                    <div class="input-focus-effect"></div>
                </div>

                <button type="submit" class="login-button" onclick="handleRegister(event)">
                    <span class="button-text">Crear Cuenta</span>
                    <div class="button-glow"></div>
                </button>

                <div class="register-link">
                    <p>¿Ya tienes una cuenta? <a href="../login/login.html" class="register-link-text">Inicia sesión aquí</a></p>
                </div>
            </form>

        </div>
    </div>

    <div id="toast" class="toast hidden">
        <div class="toast-content">
            <i id="toastIcon" class="fas"></i>
            <p id="toastMessage"></p>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
