<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Match - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="floating-elements">
        <div class="floating-element floating-element-1">
            <i class="fas fa-cut"></i>
        </div>
        <div class="floating-element floating-element-2">
            <i class="fas fa-spa"></i>
        </div>
        <div class="floating-element floating-element-3">
            <i class="fas fa-paint-brush"></i>
        </div>
        <div class="floating-element floating-element-4">
            <i class="fas fa-hand-sparkles"></i>
        </div>
    </div>

    <header class="header">
        <div class="logo-container">
            <div class="logo">
                <span class="logo-text">VM</span>
            </div>
            <span class="brand-name">Velvet Match</span>
        </div>
        <nav class="nav">
            <a href="../paginaPrincipal/pantalla_principal.html" class="nav-link">Inicio</a>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-card">
            <div class="login-decoration">
                <div class="decoration-circle"></div>
                <div class="decoration-circle"></div>
                <div class="decoration-circle"></div>
            </div>

            <div class="login-header">
                <h1 class="login-title">Bienvenido de vuelta</h1>
                <p class="login-subtitle">Ingresa a tu cuenta de Velvet Match</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i>
                        Correo Electrónico
                    </label>
                    <input type="email" id="email" class="form-input" placeholder="tucorreo@ejemplo.com" required>
                    <div class="input-focus-effect"></div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i>
                        Contraseña
                    </label>
                    <div class="password-field">
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                    <div class="input-focus-effect"></div>
                </div>

                <button type="submit" class="login-button" onclick="handleLogin(event)">
                    <span class="button-text">Iniciar Sesión</span>
                    <div class="button-glow"></div>
                </button>

                <div class="register-link">
                    <p>¿No tienes una cuenta? <a href="../registrarUsuario/register.html" class="register-link-text">Regístrate aquí</a></p>
                </div>
            </form>

            
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <div class="toast-content">
            <i id="toastIcon" class="fas"></i>
            <p id="toastMessage"></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
