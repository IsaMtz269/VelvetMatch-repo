<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Match - Registro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="Registro-Empresa.css">
</head>
<body>

    <div class="container-fluid p-0">
        <div class="row g-0">
            <div class="col-lg-5 d-none d-lg-flex left-panel align-items-center justify-content-center text-white p-5 animate__animated animate__fadeInLeft">
                <div class="text-center">
                    <i class="fas fa-gem fa-4x mb-4 text-warning" style="color: var(--secondary-color) !important;"></i>
                    <h1 class="fw-bold display-5 mb-3">Únete a nosotros</h1>
                    <p class="lead opacity-75">Crea tu cuenta para agendar citas, ver tu historial y calificar nuestros servicios. Es rápido y sencillo.</p>
                </div>
            </div>

            <div class="col-lg-7 d-flex align-items-center justify-content-center min-vh-100 p-4 p-md-5 bg-white animate__animated animate__fadeInRight">
                <div class="w-100" style="max-width: 600px;">
                    
                    <div class="text-center mb-5 d-lg-none">
                        <i class="fas fa-gem fa-3x mb-3 text-primary-theme"></i>
                        <h2 class="fw-bold">Crear Cuenta</h2>
                    </div>

                    <div class="d-none d-lg-block mb-5">
                        <h2 class="fw-bold text-dark">Crear Cuenta de Cliente</h2>
                        <p class="text-muted">Por favor, completa tus datos para registrarte.</p>
                    </div>

                    <form>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Nombre(s) *</label>
                                <input type="text" class="form-control bg-light border-0 py-2" placeholder="Ej. Ana María" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Apellidos *</label>
                                <input type="text" class="form-control bg-light border-0 py-2" placeholder="Ej. López" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Correo Electrónico *</label>
                                <input type="email" class="form-control bg-light border-0 py-2" placeholder="correo@ejemplo.com" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Número de Teléfono *</label>
                                <input type="tel" class="form-control bg-light border-0 py-2" placeholder="10 dígitos" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted text-uppercase">Fecha de Nacimiento *</label>
                            <input type="date" class="form-control bg-light border-0 py-2" required>
                            <small class="text-muted" style="font-size: 0.75rem;">Para enviarte promociones en tu cumpleaños.</small>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Contraseña *</label>
                                <input type="password" class="form-control bg-light border-0 py-2" placeholder="Mínimo 8 caracteres" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Confirmar Contraseña *</label>
                                <input type="password" class="form-control bg-light border-0 py-2" placeholder="Repite tu contraseña" required>
                            </div>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <label class="form-check-label small text-muted" for="terms">Acepto los <a href="#" class="text-primary-theme fw-bold">Términos y Condiciones</a> y la Política de Privacidad.</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-theme btn-lg rounded-pill fw-bold shadow-sm">Registrarme</button>
                        </div>

                        <div class="text-center mt-4">
                            <p class="text-muted small">¿Ya tienes una cuenta? <a href="../Empresa/Empresa.html" class="fw-bold text-decoration-none" style="color: var(--secondary-color);">Inicia sesión aquí</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
